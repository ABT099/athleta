name: Full Test Suite

on:
  push:
    branches: [main]
    paths:
      - "services/ai-engine/**"
      - ".github/workflows/full-tests.yml"

jobs:
  test-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/ai-engine

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests (excluding ML)
        run: uv run pytest -m "not ml" --verbose --cov=app --cov-report=html --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./services/ai-engine/.coverage
          flags: ai-engine

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/ai-engine/htmlcov/
