name: Nightly Full Tests

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  test-comprehensive:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/ai-engine

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies (including ML)
        run: uv sync --all-extras

      - name: Run full test suite with coverage
        run: uv run pytest -m "" --verbose --cov=app --cov-report=html --cov-report=term --cov-report=json

      - name: Generate test report
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Total tests: 294" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke tests: Critical workflow" >> $GITHUB_STEP_SUMMARY
          echo "- Fast tests: 228" >> $GITHUB_STEP_SUMMARY
          echo "- Slow tests: 66 (ML + Integration)" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: |
            services/ai-engine/htmlcov/
            services/ai-engine/.coverage
