name: ML Tests (Optional)

# Manual trigger only - for comprehensive ML testing when needed
on:
  workflow_dispatch:

jobs:
  test-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/auto-regulation-service

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: services/auto-regulation-service
        run: uv sync --all-extras

      - name: Run all tests including ML
        working-directory: services/auto-regulation-service
        run: uv run pytest --verbose --cov=app --cov-report=html --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-test-coverage
          path: services/auto-regulation-service/htmlcov/
