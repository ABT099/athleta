name: PR Tests (Fast + Smoke)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "services/ai-engine/**"
      - ".github/workflows/pr-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/ai-engine

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run calculations tests (fast)
        run: uv run pytest tests/unit/calculations/ -v

      - name: Run smoke test (critical journey)
        run: uv run pytest tests/integration/journeys/test_complete_workout_journey.py::TestCompleteWorkoutWorkflow::test_complete_workout_full_workflow -v

      - name: Run core algorithm tests
        run: uv run pytest tests/unit/algorithms/ -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr
          path: services/ai-engine/htmlcov/
