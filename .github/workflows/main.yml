name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-suffix: "ai-engine"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python Dependencies
        working-directory: services/ai-engine
        run: uv sync --all-extras

      - name: Run smoke tests
        working-directory: services/ai-engine
        env:
          JWT_SECRET: "test_secret_key_for_ci_pipeline"
          JWT_ALGORITHM: "HS256"
        run: uv run pytest -m "smoke" --verbose

      - name: Run unit tests
        working-directory: services/ai-engine
        env:
          JWT_SECRET: "test_secret_key_for_ci_pipeline"
          JWT_ALGORITHM: "HS256"
        run: uv run pytest -m "not slow" --verbose

  test-exercise-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: services/exercise-inference/go.sum

      - name: Install Go dependencies
        working-directory: services/exercise-inference
        run: go mod download

      - name: Run tests
        working-directory: services/exercise-inference
        run: go test -v ./...

  build-and-push:
    needs: [test, test-exercise-inference]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ai-engine
            context: ./services/ai-engine
          - service: api
            context: ./services/api
          - service: exercise-inference
            context: ./services/exercise-inference
          - service: muscle-image-api
            context: ./services/muscle-image
          - service: migrator
            context: ./migrator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # Added traefik-dynamic.yml to the deployment
          source: "./docker-compose.yml,./traefik-dynamic.yml,./monitoring"
          target: "/root/athleta"
          strip_components: 0

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR
          timeout: 30m
          command_timeout: 30m
          script: |
            # 1. Log in to Registry
            echo $GHCR_PAT | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            cd /root/athleta

            # 2. Setup Environment
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "DOCKER_REGISTRY=ghcr.io" >> .env
            echo "GITHUB_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> .env
            echo "IMAGE_TAG=latest" >> .env

            # 3. Setup Cloudflare Certificates (one-time, will be skipped if exists)
            if [ ! -f certs/cloudflare-cert.pem ] || [ ! -f certs/cloudflare-key.pem ]; then
              echo "⚠️  Warning: Cloudflare certificates not found in certs/ directory"
              echo "Please create them manually if using Cloudflare SSL"
            fi

            # 4. Create Directories
            mkdir -p backups
            mkdir -p monitoring/grafana/provisioning

            # 5. Permission Fix for Prometheus
            docker run --rm -v $(pwd)/prometheus_data:/data alpine chown -R 65534:65534 /data || true

            # 6. PULL
            # Pull largest images first, one by one
            echo "Pulling AI Engine..."
            docker compose pull ai-engine
            echo "Pulling Neo4j..."
            docker compose pull neo4j
            echo "Pulling Database..."
            docker compose pull db
            # Pull remaining small services
            echo "Pulling remaining services..."
            docker compose pull

            # 7. START
            docker compose --profile monitoring up -d --remove-orphans --no-build

            # 8. Cleanup
            docker image prune -f

            # 9. Verify deployment
            echo "✅ Deployment complete. Checking service status..."
            docker compose ps
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
