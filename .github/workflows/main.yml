name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-suffix: "ai-engine"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python Dependencies
        working-directory: services/ai-engine
        run: uv sync --all-extras

      - name: Test AI Engine
        working-directory: services/ai-engine
        env:
          JWT_SECRET: "test_secret_key_for_ci_pipeline"
          JWT_ALGORITHM: "HS256"
        run: uv run python -m pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [ai-engine, api, exercise-inference, muscle-image, migrator]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to the Container registery
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # NOTICE: We are copying docker-compose.prod.yml now too
          source: "./docker-compose.yml,./docker-compose.prod.yml,./monitoring"
          target: "/root/athleta"
          strip_components: 0

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /root/athleta

            # Setup Environment
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "DOCKER_REGISTRY=ghcr.io" >> .env
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            echo "IMAGE_TAG=latest" >> .env

            # Create Directories
            mkdir -p backups
            mkdir -p monitoring/grafana/provisioning

            # Permission Fix for Prometheus
            docker run --rm -v $(pwd)/prometheus_data:/data alpine chown -R 65534:65534 /data || true

            # Login to Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # PULL (Using Both Files)
            # This looks at prod.yml to find the "image:" links and pulls them
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # START (Using Both Files + Monitoring Profile)
            # --profile monitoring: Ensures Grafana/Prometheus start even if hidden locally
            docker compose --profile monitoring -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup
            docker image prune -a -f
