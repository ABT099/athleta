services:
  ai-engine:
    image: ghcr.io/${GITHUB_REPOSITORY}/ai-engine:latest
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "0.1"
          memory: 256M

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    env_file: ".env"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  exercise-inference:
    image: ghcr.io/${GITHUB_REPOSITORY}/exercise-inference:latest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  migrator:
    image: ghcr.io/${GITHUB_REPOSITORY}/migrator:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  neo4j:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  grafana:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M
