syntax = "proto3";

package exercise.v1;

option go_package = "github.com/athleta/exercise-service/gen/exercise/v1;exercisev1";

// ExerciseService owns the exercise domain: it resolves free-form exercise
// names into structured, attribute-composed exercises backed by the exercise
// graph, and answers exercise-level queries (lookup, substitution).
//
// Exercises are compositions of atomic attributes (movement pattern,
// equipment, laterality, angle, grip, tempo) plus muscle targets with roles.
// Attribute vocabularies are defined by the graph, not this contract, so they
// are transported as strings; the closed sets in use today are documented on
// each field.
service ExerciseService {
  // InferExercises resolves raw exercise name strings into structured
  // exercises. Names that match the curated vocabulary resolve to their
  // canonical exercise; unknown names are inferred from their attributes and
  // persisted. Every input name yields exactly one result, in input order.
  // This call never fails on an unrecognizable name — the result carries a
  // resolution kind and confidence instead.
  rpc InferExercises(InferExercisesRequest) returns (InferExercisesResponse);

  // GetExercises fetches exercises by ID. Unknown IDs are omitted from the
  // response rather than failing the call.
  rpc GetExercises(GetExercisesRequest) returns (GetExercisesResponse);

  // FindSubstitutions returns exercises that can replace the given exercise,
  // scored by muscle-activation overlap and structural (pattern/equipment/
  // type) similarity. Joint-stress exclusions allow callers to inject
  // athlete-specific constraints without this service knowing about athletes.
  rpc FindSubstitutions(FindSubstitutionsRequest) returns (FindSubstitutionsResponse);

  // GetMuscles returns muscle metadata (size, recovery, role hints) from the
  // graph's muscle taxonomy. Empty input returns all muscles, which callers
  // use for seeding and validation.
  rpc GetMuscles(GetMusclesRequest) returns (GetMusclesResponse);
}

message InferExercisesRequest {
  repeated string names = 1;
}

message InferExercisesResponse {
  // One entry per requested name, in request order.
  repeated InferredExercise exercises = 1;
}

message InferredExercise {
  enum Resolution {
    RESOLUTION_UNSPECIFIED = 0;
    // The name matched a curated vocabulary exercise.
    RESOLUTION_MATCHED = 1;
    // No confident vocabulary match; the exercise was composed from
    // attributes parsed out of the name.
    RESOLUTION_INFERRED = 2;
  }

  Exercise exercise = 1;
  // The raw input string this result corresponds to.
  string requested_name = 2;
  Resolution resolution = 3;
  // Name-match confidence in [0,1]. For RESOLUTION_MATCHED this is the
  // matcher score; for RESOLUTION_INFERRED it is the best (sub-threshold)
  // vocabulary score, or 0 when nothing came close.
  float confidence = 4;
}

message Exercise {
  // Stable integer ID, allocated by this service.
  int32 id = 1;
  string name = 2;
  // squat | hinge | push | pull | lunge | carry | rotation
  string movement_pattern = 3;
  // compound | isolation
  string exercise_type = 4;
  // CNS-demand category: compound_heavy | compound_moderate | isolation
  string intensity_category = 5;
  ExerciseAttributes attributes = 6;
  repeated MuscleTarget muscles = 7;
  SafetyProfile safety = 8;
}

// The atomic attributes an exercise is composed of. Empty string means the
// attribute does not apply or was not determined.
message ExerciseAttributes {
  // barbell | dumbbell | kettlebell | cable | machine | bodyweight | landmine | band
  string equipment = 1;
  // bilateral | unilateral | alternating | isometric_hold
  string laterality = 2;
  // flat | incline | decline | overhead | floor_level
  string angle = 3;
  // neutral | pronated | supinated | wide | narrow | staggered | split
  string grip = 4;
  // pause | tempo | explosive | eccentric_focus | accommodating_resistance
  string tempo = 5;
  // horizontal | vertical — force direction for push/pull patterns
  string force_vector = 6;
}

message MuscleTarget {
  string name = 1;
  string display_name = 2;
  // prime_mover | synergist | stabilizer
  string role = 3;
  // Relative activation derived from role: 85 / 55 / 25.
  int32 activation_percent = 4;
}

message SafetyProfile {
  // 1.0 (low) .. 3.0 (high)
  float injury_risk_level = 1;
  // 0.0 .. 1.0
  float complexity_score = 2;
  // e.g. shoulder, elbow, knee, hip, ankle, lower_back
  repeated string joint_stress_areas = 3;
}

message GetExercisesRequest {
  repeated int32 ids = 1;
}

message GetExercisesResponse {
  repeated Exercise exercises = 1;
}

message FindSubstitutionsRequest {
  int32 exercise_id = 1;
  // Candidates stressing any of these joints are excluded.
  repeated string exclude_joint_stress = 2;
  repeated int32 exclude_exercise_ids = 3;
  // Maximum results to return; defaults to 5.
  int32 limit = 4;
}

message FindSubstitutionsResponse {
  repeated Substitution substitutions = 1;
}

message Substitution {
  Exercise exercise = 1;
  // Hybrid similarity in [0,1]: muscle-activation overlap weighted with
  // structural (pattern/equipment/type/complexity) similarity.
  float score = 2;
  // Human-readable explanation, e.g. "targets same muscles, similar movement pattern".
  string reason = 3;
}

message GetMusclesRequest {
  // Muscle names to fetch. Empty returns all muscles.
  repeated string names = 1;
}

message GetMusclesResponse {
  repeated Muscle muscles = 1;
}

message Muscle {
  enum Size {
    SIZE_UNSPECIFIED = 0;
    SIZE_SMALL = 1;
    SIZE_MEDIUM = 2;
    SIZE_LARGE = 3;
  }

  string name = 1;
  string display_name = 2;
  Size size = 3;
  // Baseline recovery time in hours, used for volume/recovery planning.
  int32 recovery_hours = 4;
  // Role hint: name of the antagonist muscle, "" when none.
  string antagonist = 5;
  // Role hint: whether this muscle is a primary target of compound lifts.
  bool is_compound_target = 6;
}
