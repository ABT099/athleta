services:
  traefik:
    container_name: traefik
    image: traefik:v3.6
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic/certs.yml:ro
    networks:
      - public
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
  db:
    container_name: athleta_db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: athleta
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  autoreg-db:
    container_name: athleta_autoreg_db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: autoreg
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - autoreg_postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  neo4j:
    container_name: athleta_neo4j
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_memory_heap_initial__size: 256M
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_connector_bolt_listen__address: 0.0.0.0:7687
      NEO4J_dbms_connector_http_listen__address: 0.0.0.0:7474
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    container_name: athleta_redis
    image: redis:8-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  exercise-service:
    container_name: athleta_exercise_service
    image: ghcr.io/${GITHUB_REPOSITORY}/exercise-service:latest
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # POSTGRES_* are only used by the one-off `migrate` import command.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: athleta
      GRPC_PORT: 50051
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "grpc_health_probe",
          "-addr=:50051",
          "-connect-timeout=5s",
          "-rpc-timeout=5s",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  muscle-image-api:
    container_name: muscle-image-api
    image: ghcr.io/${GITHUB_REPOSITORY}/muscle-image:latest
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-athleta-muscle-images}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  auto-regulation-service:
    container_name: athleta_auto_regulation_service
    image: ghcr.io/${GITHUB_REPOSITORY}/auto-regulation-service:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/athleta
      AUTOREG_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@autoreg-db:5432/autoreg
      REDIS_URL: redis://redis:6379/0
      EXERCISE_SERVICE_ADDR: exercise-service:50051
      API_BASE_URL: http://api:8080
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - public
      - backend
    depends_on:
      db:
        condition: service_healthy
      autoreg-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      exercise-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=athleta_public"
      - "traefik.http.routers.auto-regulation-service.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.auto-regulation-service.entrypoints=websecure"
      - "traefik.http.routers.auto-regulation-service.tls=true"
      - "traefik.http.services.auto-regulation-service.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.ai-security.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.ai-security.headers.accessControlAllowHeaders=Authorization,Content-Type,Accept"
      - "traefik.http.middlewares.ai-security.headers.accessControlAllowOriginList=*"
      - "traefik.http.middlewares.ai-security.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.ai-security.headers.contentTypeNosniff=true"
      - "traefik.http.routers.auto-regulation-service.middlewares=ai-security,ai-rate-limit"
      - "traefik.http.middlewares.ai-rate-limit.ratelimit.average=50"
      - "traefik.http.middlewares.ai-rate-limit.ratelimit.burst=30"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "0.1"
          memory: 256M

  celery-worker:
    container_name: athleta_celery_worker
    image: ghcr.io/${GITHUB_REPOSITORY}/auto-regulation-service:latest
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/athleta
      AUTOREG_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@autoreg-db:5432/autoreg
      REDIS_URL: redis://redis:6379/0
      EXERCISE_SERVICE_ADDR: exercise-service:50051
      API_BASE_URL: http://api:8080
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      autoreg-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M

  api:
    container_name: athleta_api
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    env_file: ".env"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/athleta
      AUTO_REGULATION_SERVICE_URL: http://auto-regulation-service:8000
      EXERCISE_SERVICE_URL: exercise-service:50051
      MUSCLE_IMAGE_URL: http://muscle-image-api:80
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ISSUER: athleta-api
    networks:
      - public
      - backend
    depends_on:
      db:
        condition: service_healthy
      auto-regulation-service:
        condition: service_healthy
      exercise-service:
        condition: service_healthy
      muscle-image-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=athleta_public"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Authorization,Content-Type,Accept,X-Requested-With"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=*"
      - "traefik.http.middlewares.api-cors.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.api-cors.headers.contentTypeNosniff=true"
      - "traefik.http.routers.api.middlewares=api-cors,api-rate-limit"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.burst=50"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  prometheus:
    profiles: ["monitoring"]
    container_name: athleta_prometheus
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    profiles: ["monitoring"]
    container_name: athleta_grafana
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
      - public
    depends_on:
      - prometheus
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M

networks:
  public:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
    driver: local
  autoreg_postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  traefik_certs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
